name: push-notify

# שולח התראות פוש (התפנה תור / תור חדש) לאפליקציה סגורה.
# רץ כל 5 דקות, וגם ניתן להריץ ידנית מלשונית Actions (Run workflow).
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: push-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: .github/scripts
        run: npm install --no-audit --no-fund

      - name: Send pending push notifications
        working-directory: .github/scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node send-push.js
